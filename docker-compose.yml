name: kconecta-crm

services:
  app:
    container_name: kconecta-crm-app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8010:80"
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8010
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: kconecta_schema
      DB_USERNAME: root
      DB_PASSWORD: secret
    depends_on:
      - mysql
    volumes:
      - .:/var/www/html
      - app-vendor:/var/www/html/vendor
      - app-build:/var/www/html/public/build

  mysql:
    container_name: kconecta-crm-mysql
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: kconecta_schema
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - db-data:/var/lib/mysql

volumes:
  db-data:
  app-vendor:
  app-build:
